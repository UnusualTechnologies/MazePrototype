<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Bug Race</title>
    <script src="https://unpkg.com/@colyseus/sdk@0.17.0/dist/colyseus.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            transition: filter 0.1s;
        }

        /* Layout wrapper to handle side-by-side or stacked orientation */
        #main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #hud {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
            width: 250px; /* Fixed width for side panel */
            flex-shrink: 0;
            z-index: 5;
            transition: opacity 0.3s;
        }
        
        .hud-buttons {
            display: flex;
            gap: 5px;
            width: 100%;
            margin-bottom: 5px;
        }
        
        #timer { 
            font-size: 2.5rem; 
            font-weight: bold; 
            color: #fff; 
            font-family: monospace; 
            text-shadow: 0 0 5px #000, 0 0 10px #000;
        }
        
        #scoreboard { 
            font-size: 1.2rem; 
            color: #fff; 
            text-align: left; 
            line-height: 1.6; 
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        #friend-code-hud {
            font-family: monospace;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            text-align: left;
            color: rgba(255, 255, 255, 0.7);
        }

        #game-container {
            position: relative;
            height: 100%;
            max-height: 85vh; /* Keep it from touching screen bounds */
            aspect-ratio: 1 / 1; /* Force perfect square */
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
            background: #000000;
            overflow: hidden;
            transition: filter 0.1s;
            flex-shrink: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10;
            transition: opacity 0.3s, background-color 0.5s;
            padding: 20px;
        }

        /* Celebratory pulse effect for match winner */
        @keyframes winnerPulse {
            0% { box-shadow: inset 0 0 30px var(--winner-color); background-color: rgba(0, 0, 0, 0.95); }
            50% { box-shadow: inset 0 0 150px var(--winner-color); background-color: rgba(0, 0, 0, 0.80); }
            100% { box-shadow: inset 0 0 30px var(--winner-color); background-color: rgba(0, 0, 0, 0.95); }
        }

        .winner-pulse {
            animation: winnerPulse 2s infinite ease-in-out;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            color: #fff;
            text-align: center;
        }

        p.subtitle {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            color: #aaa;
            text-align: center;
            max-width: 90%;
            line-height: 1.4;
        }

        .menu-friend-code {
            font-family: monospace;
            font-size: 1.2rem;
            color: #00ffff;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* Post-Match Statistics Customization */
        .pm-buttons-vertical {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }

        .pm-buttons-vertical button {
            width: 100%;
            margin: 0;
        }

        .stats-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .scrollable-rounds {
            overflow-y: auto;
            max-height: 150px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-family: monospace;
            font-size: 1rem;
            color: #ddd;
            text-align: left;
            line-height: 1.8;
        }

        /* Lobby Grid Styles */
        #slots-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            overflow-y: auto;
            max-height: 50vh;
            padding-right: 5px;
        }

        .player-slot {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .player-slot.inactive {
            opacity: 0.5;
            border-color: transparent;
        }

        .slot-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .color-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        select, input[type="number"] {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }

        select:focus, input[type="number"]:focus {
            border-color: #00ffff;
        }

        button.action-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #050510;
            background: #00ffff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffff;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            margin: 5px;
        }

        button.action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
        }

        button.secondary-btn {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        button.secondary-btn:hover {
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
        }

        button.tertiary-btn {
            background: #39ff14;
            box-shadow: 0 0 20px #39ff14;
        }
        
        button.tertiary-btn:hover {
            box-shadow: 0 0 30px #39ff14, 0 0 60px #39ff14;
        }

        /* Muted state specifically for the UI audio button */
        button.action-btn.muted {
            background: #555 !important;
            box-shadow: 0 0 10px #555 !important;
            color: #aaa !important;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .join-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .join-group input[type="text"] {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            font-family: monospace;
            outline: none;
            width: 120px;
            text-align: center;
            text-transform: uppercase;
        }

        .join-group input[type="text"]::placeholder {
            color: rgba(255,255,255,0.3);
            text-transform: none;
        }

        .join-group button {
            padding: 10px 25px;
            font-size: 1rem;
            margin: 0;
        }

        #controls-hint {
            position: absolute;
            bottom: 10px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .lobby-settings-panel {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        #version-number {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #888;
            z-index: 100;
            pointer-events: none;
        }

        /* Mobile / Portrait Viewport adjustments */
        @media (max-width: 900px), (max-aspect-ratio: 1/1) {
            h1 { font-size: 2rem; }
            #slots-container { grid-template-columns: 1fr; }
            
            #main-wrapper {
                flex-direction: column;
                gap: 15px;
            }

            #hud {
                flex-direction: row;
                flex-wrap: wrap; /* allow natural wrapping on small screens */
                width: 100%;
                max-width: 85vmin;
                justify-content: space-between;
                align-items: center;
                height: auto;
                padding: 0;
                gap: 10px;
            }

            .hud-buttons {
                width: auto !important;
                margin-bottom: 0 !important;
            }

            #in-game-menu-btn, #in-game-restart-btn, #in-game-mute-btn {
                width: auto !important;
                padding: 8px 15px !important;
                font-size: 0.9rem !important;
                margin: 0 !important;
                flex: none !important;
            }

            #timer { 
                font-size: 1.8rem; 
            }

            #scoreboard, #friend-code-hud { 
                text-align: right; 
                width: 48%; /* Split space half and half to sit nicely together */
                padding: 10px;
                font-size: 0.9rem;
            }
            #friend-code-hud {
                text-align: left; /* Keep left alignment for text inside */
            }

            #game-container {
                width: 100%;
                height: auto;
                max-width: 85vmin;
                max-height: 85vmin;
            }
        }
    </style>
</head>
<body>

    <div id="version-number">v1.1.18</div>

    <div id="main-wrapper">
        <div id="hud" class="hidden">
            <div class="hud-buttons">
                <button class="action-btn secondary-btn" id="in-game-menu-btn" style="padding: 10px; font-size: 0.9rem; flex: 1; margin: 0;">Menu</button>
                <button class="action-btn tertiary-btn" id="in-game-restart-btn" style="padding: 10px; font-size: 0.9rem; flex: 1; margin: 0;">Restart</button>
                <button class="action-btn" id="in-game-mute-btn" style="padding: 10px; font-size: 0.9rem; flex: 1; margin: 0; background: #ff9900; box-shadow: 0 0 20px #ff9900; color: #000;">Mute</button>
            </div>
            <div id="timer">00:00.000</div>
            <div id="scoreboard"></div>
            <div id="friend-code-hud">Friend code: <span class="display-friend-code" style="color: #00ffff; font-weight: bold;"></span></div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- This menu now ONLY appears when the entire match is over -->
            <div id="post-match-layer" class="menu-overlay hidden">
                <h1 id="pm-title">Match Over</h1>
                
                <div class="pm-buttons-vertical">
                    <button class="action-btn" id="play-again-btn">Play Again</button>
                    <button class="action-btn secondary-btn" id="menu-btn">Main Menu</button>
                </div>

                <div class="stats-container">
                    <p class="subtitle" id="pm-subtitle" style="margin-bottom: 0;"></p>
                    <div id="pm-round-times" class="scrollable-rounds">
                        <!-- Round times dynamically added here -->
                    </div>
                </div>
            </div>

            <!-- Initial Main Menu -->
            <div id="initial-menu" class="menu-overlay">
                <h1>Neon Bug Race</h1>
                <p class="subtitle">First to 3 wins. Orbs teleport opponents, black holes teleport you.</p>
                
                <button class="action-btn" id="quick-start-btn">Quick Start</button>
                
                <div class="join-group">
                    <input type="text" id="join-code-input" placeholder="Code..." maxlength="12" style="text-transform: uppercase;">
                    <button class="action-btn secondary-btn" id="join-friend-btn">Join Friend</button>
                </div>

                <button class="action-btn tertiary-btn" id="custom-settings-btn">Custom</button>
            </div>

            <!-- Custom Lobby Menu -->
            <div id="lobby-layer" class="menu-overlay hidden">
                <h1>Custom Game</h1>
                <div id="slots-container">
                    <!-- Slots dynamically generated -->
                </div>
                
                <!-- Match Settings Toggle -->
                <div class="lobby-settings-panel">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="grid-size-input" style="font-size: 1.2rem;">Grid Size:</label>
                        <input type="number" id="grid-size-input" value="20" min="5" max="100" style="font-size: 1.1rem; padding: 5px; width: 80px; text-align: center;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="pu-opp-input" style="font-size: 1.2rem;">Orbs (Teleport Others):</label>
                        <input type="number" id="pu-opp-input" value="10" min="0" max="100" style="font-size: 1.1rem; padding: 5px; width: 80px; text-align: center;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="pu-self-input" style="font-size: 1.2rem;">Holes (Teleport Self):</label>
                        <input type="number" id="pu-self-input" value="10" min="0" max="100" style="font-size: 1.1rem; padding: 5px; width: 80px; text-align: center;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="pu-rocket-input" style="font-size: 1.2rem;">Homing Rockets:</label>
                        <input type="number" id="pu-rocket-input" value="0" min="0" max="100" style="font-size: 1.1rem; padding: 5px; width: 80px; text-align: center;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="collisions-toggle" checked style="width: 20px; height: 20px; cursor: pointer;"> 
                        <label for="collisions-toggle" style="font-size: 1.2rem; cursor: pointer; user-select: none;">Enable Collisions</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="private-toggle" style="width: 20px; height: 20px; cursor: pointer;"> 
                        <label for="private-toggle" style="font-size: 1.2rem; cursor: pointer; user-select: none;">Friend Code Only</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="action-btn secondary-btn" id="lobby-back-btn">Back</button>
                    <button class="action-btn" id="start-btn">Start Match</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="controls-hint">Desktop: Assigned Keys | Mobile: Swipe</div>

    <script>
        // --- BULLETPROOF AUDIO SYSTEM ---
        const Synth = {
            ctx: { state: 'running', resume: () => {} }, // Keep dummy for legacy UI code
            isMuted: true,
            bgMusic: new Audio('./assets/audio/music.ogg'),
            init() {
                this.bgMusic.loop = true;
                this.bgMusic.volume = 0.4;
                // Silently catch missing music files so the game doesn't crash on load
                this.bgMusic.onerror = () => { console.log('Music file missing or failed to load. Running silently.'); };
                
                // Initialize UI state
                const muteBtn = document.getElementById('in-game-mute-btn');
                if (muteBtn) {
                    muteBtn.innerText = "Unmute";
                    muteBtn.classList.add('muted');
                }
            },
            playSound(filename) {
                if (this.isMuted) return;
                const audio = new Audio('./assets/audio/' + filename);
                audio.volume = 0.6;
                audio.onerror = () => {}; // Silently catch missing SFX files
                audio.play().catch(() => {}); // Catch missing file promise rejections
            },
            turn(isPlayer) { if (isPlayer) this.playSound('turn.ogg'); },
            bonk(isPlayer) { if (isPlayer) this.playSound('bonk.ogg'); },
            thud() { this.playSound('thud.ogg'); },
            zip() { this.playSound('zip.ogg'); },
            glitch() { this.playSound('glitch.ogg'); },
            win() { this.playSound('win.ogg'); },
            startMusic() {
                if (!this.isMuted) {
                    this.bgMusic.play().catch(() => {});
                }
            },
            muffle(isMuffled) {
                this.bgMusic.volume = isMuffled ? 0.15 : 0.4;
            },
            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.isMuted) {
                    this.bgMusic.pause();
                } else {
                    this.bgMusic.play().catch(() => {});
                }
                return this.isMuted;
            }
        };
        // --- END AUDIO SYSTEM ---

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const gameContainer = document.getElementById('game-container');
        
        // UI Layers
        const initialMenu = document.getElementById('initial-menu');
        const lobbyLayer = document.getElementById('lobby-layer');
        const postMatchLayer = document.getElementById('post-match-layer');
        const hud = document.getElementById('hud');
        const slotsContainer = document.getElementById('slots-container');
        
        // Buttons & Text
        const inGameMenuBtn = document.getElementById('in-game-menu-btn');
        const inGameRestartBtn = document.getElementById('in-game-restart-btn');
        const inGameMuteBtn = document.getElementById('in-game-mute-btn');
        const gridSizeInput = document.getElementById('grid-size-input');
        const totalEntitiesInput = document.getElementById('total-entities-input');
        
        const quickStartBtn = document.getElementById('quick-start-btn');
        const customSettingsBtn = document.getElementById('custom-settings-btn');
        const joinFriendBtn = document.getElementById('join-friend-btn');
        const joinCodeInput = document.getElementById('join-code-input');
        const lobbyBackBtn = document.getElementById('lobby-back-btn');
        const startBtn = document.getElementById('start-btn');
        const playAgainBtn = document.getElementById('play-again-btn');
        const menuBtn = document.getElementById('menu-btn');
        const pmTitle = document.getElementById('pm-title');
        const pmSubtitle = document.getElementById('pm-subtitle');
        const timerElement = document.getElementById('timer');
        const scoreboardElement = document.getElementById('scoreboard');

        let width, height;
        let cols = 20; 
        let rows = 20; 
        let cellSize;
        
        let grid = [];
        let distanceMap = [];
        let bugs = [];
        let powerUps = []; 
        let shockwaves = []; 
        let particles = [];
        let rockets = []; // Store active homing rockets
        
        let gameState = 'MENU'; // MENU, PLAYING, ROUND_OVER_COUNTDOWN, MATCH_OVER, INITIALIZING
        let animationId;
        let lastTime = 0;
        let screenShake = 0;

        // Game Loop & Match Structure Variables
        const WINS_NEEDED = 3;
        let activePlayersData = [];
        let scores = {};
        let matchTime = 0;
        let roundStartTime = 0;
        let roundCountdown = 0;
        let currentWinner = null;
        let roundTimes = [];

        let bestTime = parseFloat(localStorage.getItem('neonBugBestTime')) || null;
        let worstTime = parseFloat(localStorage.getItem('neonBugWorstTime')) || null;

        let goal = { x: Math.floor(cols / 2), y: Math.floor(rows / 2) };

        const colors = {
            powerupOpponents: '#ffff00',
            powerupSelf: '#ffffff',
            wall: '#4a4a7a',  
            bg: '#000000'     
        };



        // 8 highly distinct player colors spanning the spectrum
        const playerColors = [
            '#ff0055', // 0: Neon Crimson/Red
            '#ff8800', // 1: Neon Orange
            '#ffee00', // 2: Neon Yellow
            '#00ff22', // 3: Neon Green
            '#00ffff', // 4: Neon Cyan
            '#4466ff', // 5: Neon Blue
            '#aa00ff', // 6: Neon Purple
            '#ff00ff'  // 7: Neon Magenta/Pink
        ];

        function getStartPos(index) {
            const positions = [
                {x: 0, y: 0},
                {x: cols - 1, y: 0},
                {x: 0, y: rows - 1},
                {x: cols - 1, y: rows - 1},
                {x: Math.floor(cols / 2), y: 0},
                {x: cols - 1, y: Math.floor(rows / 2)},
                {x: Math.floor(cols / 2), y: rows - 1},
                {x: 0, y: Math.floor(rows / 2)}
            ];
            return positions[index];
        }

        // --- LOBBY SYSTEM ---
        const lobbySlots = [];

        function buildLobby() {
            slotsContainer.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const slotDiv = document.createElement('div');
                slotDiv.className = 'player-slot';
                
                let defaultType = 'inactive';
                if (i === 0) defaultType = 'local';
                else if (i < 4) defaultType = 'ai_online';
                
                let defaultControl = 'WASD';
                if (i === 1) defaultControl = 'TFGH';
                else if (i === 2) defaultControl = 'IJKL';
                else if (i === 3) defaultControl = 'Arrows';
                else if (i >= 4) defaultControl = 'Numpad';

                slotDiv.innerHTML = `
                    <div class="slot-header">
                        <div class="color-indicator" style="background-color: ${playerColors[i]}; color: ${playerColors[i]}"></div>
                        <span>Player ${i + 1}</span>
                    </div>
                    <select class="type-select">
                        <option value="inactive" ${defaultType === 'inactive' ? 'selected' : ''}>Disable</option>
                        <option value="local" ${defaultType === 'local' ? 'selected' : ''}>Local Player</option>
                        <option value="ai_online" ${defaultType === 'ai_online' ? 'selected' : ''}>Online</option>
                        <option value="ai_only" ${defaultType === 'ai_only' ? 'selected' : ''}>Computer</option>
                    </select>
                    <select class="control-select" style="display: ${defaultType === 'local' ? 'block' : 'none'}">
                        <option value="WASD" ${defaultControl === 'WASD' ? 'selected' : ''}>WASD Keys</option>
                        <option value="TFGH" ${defaultControl === 'TFGH' ? 'selected' : ''}>TFGH Keys</option>
                        <option value="IJKL" ${defaultControl === 'IJKL' ? 'selected' : ''}>IJKL Keys</option>
                        <option value="Arrows" ${defaultControl === 'Arrows' ? 'selected' : ''}>Arrow Keys</option>
                        <option value="Numpad" ${defaultControl === 'Numpad' ? 'selected' : ''}>Numpad (8456)</option>
                        <option value="controller_1">Controller 1 (Dummy)</option>
                        <option value="controller_2">Controller 2 (Dummy)</option>
                    </select>
                    <div class="ai-settings" style="display: ${defaultType === 'ai_online' || defaultType === 'ai_only' ? 'flex' : 'none'}; flex-direction: column; gap: 5px;">
                        <select class="ai-speed-select">
                            <option value="random">Speed: Random</option>
                            <option value="scaling" selected>Speed: Scaling</option>
                            <option value="easy">Speed: Easy</option>
                            <option value="intermediate">Speed: Intermediate</option>
                            <option value="hard">Speed: Hard</option>
                            <option value="custom">Speed: Custom</option>
                        </select>
                        <div class="custom-speed-wrapper" style="display: none; align-items: center; gap: 5px;">
                            <input type="range" class="custom-speed-slider" min="100" max="1000" value="250" step="10" style="flex: 1; cursor: pointer;">
                            <span class="custom-speed-display" style="font-size: 0.9rem; min-width: 35px; text-align: right;">250</span>
                        </div>
                        <select class="ai-behavior-select">
                            <option value="random" selected>Style: Random</option>
                            <option value="explorer">Style: Explorer</option>
                            <option value="guesser">Style: Guesser</option>
                            <option value="focused">Style: Focused</option>
                        </select>
                    </div>
                `;

                const typeSelect = slotDiv.querySelector('.type-select');
                const controlSelect = slotDiv.querySelector('.control-select');
                const aiSettings = slotDiv.querySelector('.ai-settings');
                const aiSpeedSelect = slotDiv.querySelector('.ai-speed-select');
                const customSpeedWrapper = slotDiv.querySelector('.custom-speed-wrapper');
                const customSpeedSlider = slotDiv.querySelector('.custom-speed-slider');
                const customSpeedDisplay = slotDiv.querySelector('.custom-speed-display');
                const aiBehaviorSelect = slotDiv.querySelector('.ai-behavior-select');

                aiSpeedSelect.addEventListener('change', (e) => {
                    if (e.target.value === 'custom') {
                        customSpeedWrapper.style.display = 'flex';
                    } else {
                        customSpeedWrapper.style.display = 'none';
                    }
                });

                customSpeedSlider.addEventListener('input', (e) => {
                    customSpeedDisplay.innerText = e.target.value;
                });

                typeSelect.addEventListener('change', (e) => {
                    const val = e.target.value;
                    
                    if (val === 'inactive') slotDiv.classList.add('inactive');
                    else slotDiv.classList.remove('inactive');

                    if (val === 'local') {
                        controlSelect.style.display = 'block';
                        aiSettings.style.display = 'none';
                    } else if (val === 'ai_online' || val === 'ai_only') {
                        controlSelect.style.display = 'none';
                        aiSettings.style.display = 'flex';
                    } else { // Handle inactive and friend_code
                        controlSelect.style.display = 'none';
                        aiSettings.style.display = 'none';
                    }
                });

                if (defaultType === 'inactive') slotDiv.classList.add('inactive');

                slotsContainer.appendChild(slotDiv);
                lobbySlots.push({
                    id: `Player ${i + 1}`,
                    color: playerColors[i],
                    typeSelect: typeSelect,
                    controlSelect: controlSelect,
                    aiSpeedSelect: aiSpeedSelect,
                    customSpeedSlider: customSpeedSlider,
                    aiBehaviorSelect: aiBehaviorSelect,
                    index: i
                });
            }
        }

        function parseLobby() {
            activePlayersData = [];
            lobbySlots.forEach(slot => {
                const type = slot.typeSelect.value;
                if (type !== 'inactive') {
                    // For prototype purposes, we'll treat "friend_code" as a local player who isn't fully active but shown
                    const isLocal = (type === 'local' || type === 'friend_code');
                    activePlayersData.push({
                        id: slot.id,
                        color: slot.color,
                        isPlayer: isLocal,
                        controlScheme: isLocal ? slot.controlSelect.value : null,
                        aiSpeed: slot.aiSpeedSelect.value,
                        aiCustomSpeed: parseInt(slot.customSpeedSlider.value, 10),
                        aiBehavior: slot.aiBehaviorSelect.value,
                        startIndex: slot.index
                    });
                    if (!(slot.id in scores)) scores[slot.id] = 0;
                }
            });
        }


        // --- ENTITY CLASSES ---
        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.walls = [true, true, true, true]; 
                this.visited = false;
            }
        }

        class Shockwave {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.life = 1.0;
                this.maxRadius = cellSize * 4;
            }
            update(dt) {
                this.life -= dt * 0.002; 
                return this.life > 0;
            }
            draw() {
                const currentRadius = (1 - this.life) * this.maxRadius;
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.life * 8;
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                // Faster and more dramatic burst speed for stronger visual impact
                const speed = (Math.random() * 15 + 4) * (cellSize * 0.02); 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01; 
                this.size = Math.random() * (cellSize * 0.25) + 2;
            }
            update(dt) {
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.x += this.vx * (dt * 0.05);
                this.y += this.vy * (dt * 0.05);
                this.life -= this.decay * (dt * 0.05);
                return this.life > 0;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            }
        }
        
        class Rocket {
            constructor(x, y, color, ownerBug) {
                this.gridX = x;
                this.gridY = y;
                this.pixelX = x * cellSize + cellSize / 2;
                this.pixelY = y * cellSize + cellSize / 2;
                this.color = color;
                this.owner = ownerBug;
                this.moveTimer = 0;
                this.moveInterval = 100; // Zooms at 100ms per square
                this.life = true;
                this.angle = 0;
                this.stepsTaken = 0;
            }

            update(dt) {
                this.moveTimer += dt;
                
                // Smooth visual following
                const targetX = this.gridX * cellSize + cellSize / 2;
                const targetY = this.gridY * cellSize + cellSize / 2;
                this.pixelX += (targetX - this.pixelX) * 0.4;
                this.pixelY += (targetY - this.pixelY) * 0.4;

                if (this.moveTimer >= this.moveInterval) {
                    this.moveTimer = 0;
                    this.step();
                }
                return this.life;
            }

            step() {
                if (this.gridX === goal.x && this.gridY === goal.y) {
                    this.life = false;
                    for(let i=0; i<20; i++) particles.push(new Particle(this.pixelX, this.pixelY, this.color));
                    return;
                }

                const currDist = distanceMap[this.gridX][this.gridY];
                let bestMove = null;
                let minDist = currDist;
                
                const cell = grid[this.gridX][this.gridY];

                if (!cell.walls[0] && distanceMap[this.gridX][this.gridY-1] < minDist) { bestMove = {dx: 0, dy: -1}; minDist = distanceMap[this.gridX][this.gridY-1]; }
                if (!cell.walls[1] && distanceMap[this.gridX+1][this.gridY] < minDist) { bestMove = {dx: 1, dy: 0}; minDist = distanceMap[this.gridX+1][this.gridY]; }
                if (!cell.walls[2] && distanceMap[this.gridX][this.gridY+1] < minDist) { bestMove = {dx: 0, dy: 1}; minDist = distanceMap[this.gridX][this.gridY+1]; }
                if (!cell.walls[3] && distanceMap[this.gridX-1][this.gridY] < minDist) { bestMove = {dx: -1, dy: 0}; minDist = distanceMap[this.gridX-1][this.gridY]; }

                if (bestMove) {
                    this.gridX += bestMove.dx;
                    this.gridY += bestMove.dy;
                    this.angle = Math.atan2(bestMove.dy, bestMove.dx);
                    this.stepsTaken++;
                } else {
                    this.life = false;
                }

                // Check collision with bugs on the way
                bugs.forEach(b => {
                    if (b.gridX === this.gridX && b.gridY === this.gridY && b.state === 'normal') {
                        // Don't hit yourself on the exact frame it launches
                        if (b === this.owner && this.stepsTaken === 0) return;
                        
                        startTeleport(b);
                        screenShake = 10;
                        for(let i=0; i<15; i++) particles.push(new Particle(this.pixelX, this.pixelY, this.color));
                    }
                });

                if (this.gridX === goal.x && this.gridY === goal.y) {
                    this.life = false;
                    for(let i=0; i<20; i++) particles.push(new Particle(this.pixelX, this.pixelY, this.color));
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.pixelX, this.pixelY);
                ctx.rotate(this.angle + Math.PI / 2); // Point triangle in direction of travel
                ctx.beginPath();
                ctx.moveTo(0, -cellSize * 0.4);
                ctx.lineTo(cellSize * 0.25, cellSize * 0.25);
                ctx.lineTo(0, cellSize * 0.1);
                ctx.lineTo(-cellSize * 0.25, cellSize * 0.25);
                ctx.closePath();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Bug {
            constructor(data) {
                const pos = getStartPos(data.startIndex || 0);
                this.gridX = data.x !== undefined ? data.x : pos.x;
                this.gridY = data.y !== undefined ? data.y : pos.y;
                this.pixelX = 0;
                this.pixelY = 0;
                this.lastPixelX = 0;
                this.lastPixelY = 0;
                
                this.id = data.id;
                this.sessionId = data.sessionId || null;
                this.color = data.color;
                this.isPlayer = data.isPlayer;
                this.isLocal = !!data.isLocal;
                this.controlScheme = data.controlScheme || 'WASD';
                
                this.trail = [];
                this.maxTrail = 25;
                this.moveTimer = 0;
                this.moveCooldown = 70;

                this.lastMoveTime = 0;
                this.lastDx = 0;
                this.lastDy = 0;

                this.heldDirections = [];
                this.turnIntent = null;
                this.swipeIntent = null;

                this.state = 'normal'; 
                this.stateTimer = 0;
                this.targetGridX = 0;
                this.targetGridY = 0;
                this.flashTimer = 0;
                
                this.bonkDx = 0;
                this.bonkDy = 0;
                this.bonkTimer = 0;

                this.radius = 0;
                this.updatePixelPos(true);
            }

            updatePixelPos(instant = false) {
                const targetX = this.gridX * cellSize + cellSize / 2;
                const targetY = this.gridY * cellSize + cellSize / 2;
                
                this.lastPixelX = this.pixelX;
                this.lastPixelY = this.pixelY;

                if (instant) {
                    this.pixelX = targetX;
                    this.pixelY = targetY;
                    this.lastPixelX = targetX;
                    this.lastPixelY = targetY;
                } else {
                    this.pixelX += (targetX - this.pixelX) * 0.4;
                    this.pixelY += (targetY - this.pixelY) * 0.4;
                }
            }

            canMove(dx, dy) {
                if (this.gridX + dx < 0 || this.gridX + dx >= cols || this.gridY + dy < 0 || this.gridY + dy >= rows) return false;
                const cell = grid[this.gridX][this.gridY];
                if (!cell || !cell.walls) return false;
                if (dy === -1 && !cell.walls[0]) return true; 
                if (dx === 1 && !cell.walls[1]) return true;  
                if (dy === 1 && !cell.walls[2]) return true;  
                if (dx === -1 && !cell.walls[3]) return true; 
                return false;
            }

            triggerBonk(dx, dy) {
                if (this.bonkTimer <= 0) Synth.bonk(this.isPlayer);
                this.bonkDx = dx;
                this.bonkDy = dy;
                this.bonkTimer = 1.0;
            }

            executeMove(dx, dy) {
                if (gameState !== 'PLAYING') return;

                if (dx !== this.lastDx || dy !== this.lastDy) {
                    Synth.turn(this.isPlayer);
                    this.lastDx = dx;
                    this.lastDy = dy;
                }

                this.gridX += dx;
                this.gridY += dy;
                this.lastMoveTime = performance.now();
                
                // Authoritative local check for sending moves to server
                const isActuallyLocal = (room && room.sessionId) ? (this.sessionId === room.sessionId) : this.isLocal;
                if (isActuallyLocal && room) {
                    room.send("move", { x: this.gridX, y: this.gridY });
                }
            }

            update(dt) {
                const now = performance.now();

                // Authoritative local check for movement prediction
                const isActuallyLocal = (room && room.sessionId) ? (this.sessionId === room.sessionId) : this.isLocal;

                if (this.isPlayer && this.state === 'normal' && isActuallyLocal) {
                    if (now - this.lastMoveTime >= this.moveCooldown) {
                        let moved = false;
                        
                        // 1. Check Input Intent Buffer (if player pressed turn slightly before intersection)
                        if (this.turnIntent && now - this.turnIntent.time < 300) {
                            let dx = 0, dy = 0;
                            if (this.turnIntent.dir === 'up') dy = -1;
                            else if (this.turnIntent.dir === 'right') dx = 1;
                            else if (this.turnIntent.dir === 'down') dy = 1;
                            else if (this.turnIntent.dir === 'left') dx = -1;

                            if (this.canMove(dx, dy)) {
                                this.executeMove(dx, dy);
                                moved = true;
                                
                                // Sync buffer with held directions to preserve alternating behavior
                                const idx = this.heldDirections.indexOf(this.turnIntent.dir);
                                if (idx > -1) {
                                    this.heldDirections.splice(idx, 1);
                                    this.heldDirections.unshift(this.turnIntent.dir);
                                }
                                
                                this.turnIntent = null; // consume intent
                            }
                        }

                        // 2. Check currently held directions (incorporates original fast-turn / zigzag logic)
                        if (!moved) {
                            for (let i = this.heldDirections.length - 1; i >= 0; i--) {
                                const dir = this.heldDirections[i];
                                let dx = 0, dy = 0;
                                if (dir === 'up') dy = -1;
                                else if (dir === 'right') dx = 1;
                                else if (dir === 'down') dy = 1;
                                else if (dir === 'left') dx = -1;

                                if (this.canMove(dx, dy)) {
                                    this.executeMove(dx, dy);
                                    moved = true;
                                    
                                    // Deprioritize the successfully executed direction by moving it to the start of the array
                                    this.heldDirections.splice(i, 1);
                                    this.heldDirections.unshift(dir);
                                    break; 
                                }
                            }
                        }

                        // 3. Mobile Swipe Intent
                        if (!moved && this.swipeIntent && now - this.swipeIntent.time < 400) {
                            if (this.canMove(this.swipeIntent.dx, this.swipeIntent.dy)) {
                                this.executeMove(this.swipeIntent.dx, this.swipeIntent.dy);
                                this.swipeIntent = null; 
                                moved = true;
                            }
                        }

                        if (!moved) {
                            let bonkDx = 0, bonkDy = 0;
                            if (this.turnIntent && now - this.turnIntent.time < 300) {
                                if (this.turnIntent.dir === 'up') bonkDy = -1;
                                else if (this.turnIntent.dir === 'right') bonkDx = 1;
                                else if (this.turnIntent.dir === 'down') bonkDy = 1;
                                else if (this.turnIntent.dir === 'left') bonkDx = -1;
                            } else if (this.heldDirections.length > 0) {
                                const dir = this.heldDirections[this.heldDirections.length - 1]; 
                                if (dir === 'up') bonkDy = -1;
                                else if (dir === 'right') bonkDx = 1;
                                else if (dir === 'down') bonkDy = 1;
                                else if (dir === 'left') bonkDx = -1;
                            } else if (this.swipeIntent && now - this.swipeIntent.time < 400) {
                                bonkDx = this.swipeIntent.dx;
                                bonkDy = this.swipeIntent.dy;
                            }
                            
                            if (bonkDx !== 0 || bonkDy !== 0) {
                                this.triggerBonk(bonkDx, bonkDy);
                            }
                        }
                    }
                }

                if (this.state === 'teleport_out') {
                    this.stateTimer -= dt * 0.003; 
                    if (this.stateTimer <= 0) {
                        this.state = 'teleport_in';
                        this.stateTimer = 1.0;
                        this.gridX = this.targetGridX;
                        this.gridY = this.targetGridY;
                        this.updatePixelPos(true);
                        this.trail = [];
                    }
                    return; 
                } else if (this.state === 'teleport_in') {
                    this.stateTimer -= dt * 0.003;
                    if (this.stateTimer <= 0) {
                        this.state = 'normal';
                        // Wipe explorer memory so it doesn't get confused by the teleport
                        if (!this.isPlayer && this.aiBehavior === 'explorer') {
                            this.explorerLastX = null;
                            this.explorerLastY = null;
                        }
                    }
                    return; 
                }

                this.updatePixelPos();

                if (this.flashTimer > 0) this.flashTimer -= dt * 0.005;
                if (this.bonkTimer > 0) this.bonkTimer -= dt * 0.01;

                this.trail.push({ x: this.pixelX, y: this.pixelY });
                if (this.trail.length > this.maxTrail) this.trail.shift();
            }

            draw() {
                const size = cellSize * 0.4;
                
                // Trail
                ctx.lineWidth = size * 0.8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (this.trail.length > 1) {
                    ctx.save();
                    for (let i = 1; i < this.trail.length; i++) {
                        const alpha = i / this.trail.length;
                        ctx.strokeStyle = this.color;
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        ctx.stroke();
                    }
                    ctx.restore();
                }

                ctx.save();
                ctx.translate(this.pixelX, this.pixelY);
                
                // Teleport effect
                if (this.state === 'teleport_out' || this.state === 'teleport_in') {
                    const scale = this.state === 'teleport_out' ? this.stateTimer : (1 - this.stateTimer);
                    ctx.scale(scale, scale);
                    ctx.rotate(this.stateTimer * 10);
                }

                // Bonk effect
                if (this.bonkTimer > 0) {
                    const offset = Math.sin(this.bonkTimer * 20) * 5 * this.bonkTimer;
                    ctx.translate(this.bonkDx * offset, this.bonkDy * offset);
                }

                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                
                // Body
                ctx.fillStyle = this.color;
                if (this.flashTimer > 0) {
                    ctx.fillStyle = '#ffffff';
                }
                
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();

                // Direction indicator
                if (this.lastDx !== 0 || this.lastDy !== 0) {
                    const angle = Math.atan2(this.lastDy, this.lastDx);
                    ctx.rotate(angle);
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.moveTo(size * 0.5, -size * 0.3);
                    ctx.lineTo(size * 0.8, 0);
                    ctx.lineTo(size * 0.5, size * 0.3);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function resizeCanvas() {
            let size = Math.min(gameContainer.clientWidth, gameContainer.clientHeight);
            width = size;
            height = size;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            cellSize = width / cols;
            bugs.forEach(bug => bug.updatePixelPos(true));
            draw(true);
        }

        function generateMaze() {
            grid = [];
            for (let x = 0; x < cols; x++) {
                grid[x] = [];
                for (let y = 0; y < rows; y++) grid[x][y] = new Cell(x, y);
            }

            // Force the goal to be a dead-end with exactly one entrance
            let goalCell = grid[goal.x][goal.y];
            goalCell.visited = true; 

            let entranceNeighbors = [];
            if (goal.y > 0) entranceNeighbors.push(grid[goal.x][goal.y - 1]);
            if (goal.x < cols - 1) entranceNeighbors.push(grid[goal.x + 1][goal.y]);
            if (goal.y < rows - 1) entranceNeighbors.push(grid[goal.x][goal.y + 1]);
            if (goal.x > 0) entranceNeighbors.push(grid[goal.x - 1][goal.y]);

            let entrance = entranceNeighbors[Math.floor(Math.random() * entranceNeighbors.length)];
            removeWalls(goalCell, entrance);

            entrance.visited = true;
            let frontier = getUnvisitedNeighbors(entrance);

            while (frontier.length > 0) {
                let randomIndex = Math.floor(Math.random() * frontier.length);
                let current = frontier[randomIndex];
                frontier.splice(randomIndex, 1);

                if (current.visited) continue;

                let visitedNeighbors = getVisitedNeighbors(current);
                if (visitedNeighbors.length > 0) {
                    let vNeighbor = visitedNeighbors[Math.floor(Math.random() * visitedNeighbors.length)];
                    removeWalls(current, vNeighbor);
                    current.visited = true;

                    let newNeighbors = getUnvisitedNeighbors(current);
                    for (let n of newNeighbors) {
                        if (!frontier.includes(n)) {
                            frontier.push(n);
                        }
                    }
                }
            }
            generateDistanceMap();
        }

        function getUnvisitedNeighbors(cell) {
            let n = [];
            let x = cell.x, y = cell.y;
            if (y > 0 && !grid[x][y - 1].visited) n.push(grid[x][y - 1]);
            if (x < cols - 1 && !grid[x + 1][y].visited) n.push(grid[x + 1][y]);
            if (y < rows - 1 && !grid[x][y + 1].visited) n.push(grid[x][y + 1]);
            if (x > 0 && !grid[x - 1][y].visited) n.push(grid[x - 1][y]);
            return n;
        }

        function getVisitedNeighbors(cell) {
            let n = [];
            let x = cell.x, y = cell.y;
            if (y > 0 && grid[x][y - 1].visited && !(x === goal.x && y - 1 === goal.y)) n.push(grid[x][y - 1]);
            if (x < cols - 1 && grid[x + 1][y].visited && !(x + 1 === goal.x && y === goal.y)) n.push(grid[x + 1][y]);
            if (y < rows - 1 && grid[x][y + 1].visited && !(x === goal.x && y + 1 === goal.y)) n.push(grid[x][y + 1]);
            if (x > 0 && grid[x - 1][y].visited && !(x - 1 === goal.x && y === goal.y)) n.push(grid[x - 1][y]);
            return n;
        }

        function removeWalls(a, b) {
            let x = a.x - b.x;
            if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }

            let y = a.y - b.y;
            if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        function generateDistanceMap() {
            distanceMap = Array(cols).fill().map(() => Array(rows).fill(Infinity));
            distanceMap[goal.x][goal.y] = 0;
            let queue = [{x: goal.x, y: goal.y}];

            while(queue.length > 0) {
                let curr = queue.shift();
                let cell = grid[curr.x][curr.y];

                if (!cell.walls[0] && distanceMap[curr.x][curr.y-1] === Infinity) { distanceMap[curr.x][curr.y-1] = distanceMap[curr.x][curr.y] + 1; queue.push({x: curr.x, y: curr.y-1}); }
                if (!cell.walls[1] && distanceMap[curr.x+1][curr.y] === Infinity) { distanceMap[curr.x+1][curr.y] = distanceMap[curr.x][curr.y] + 1; queue.push({x: curr.x+1, y: curr.y}); }
                if (!cell.walls[2] && distanceMap[curr.x][curr.y+1] === Infinity) { distanceMap[curr.x][curr.y+1] = distanceMap[curr.x][curr.y] + 1; queue.push({x: curr.x, y: curr.y+1}); }
                if (!cell.walls[3] && distanceMap[curr.x-1][curr.y] === Infinity) { distanceMap[curr.x-1][curr.y] = distanceMap[curr.x][curr.y] + 1; queue.push({x: curr.x-1, y: curr.y}); }
            }
        }

        function startTeleport(b) {
            if (b.state !== 'normal') return;
            b.state = 'teleport_out';
            b.stateTimer = 1.0;
            let rx = goal.x, ry = goal.y;
            
            let isValidDestination = false;
            let attempts = 0;
            while (!isValidDestination) { 
                rx = Math.floor(Math.random() * cols); 
                ry = Math.floor(Math.random() * rows); 
                isValidDestination = true;

                // Cannot teleport onto the goal
                if (rx === goal.x && ry === goal.y) isValidDestination = false;
                
                // Cannot teleport onto a power-up
                if (powerUps.some(p => p.x === rx && p.y === ry)) isValidDestination = false;

                // Ensure teleporting player is not placed within 10 cells of the goal
                if (distanceMap.length > 0 && distanceMap[rx] && distanceMap[rx][ry] !== undefined) {
                    if (attempts < 200 && distanceMap[rx][ry] <= 10) isValidDestination = false;
                }
                
                attempts++;
            }
            
            b.targetGridX = rx; b.targetGridY = ry;
        }

        function triggerTeleport(triggeringBug) {
            bugs.forEach(b => { if (b !== triggeringBug) startTeleport(b); });
        }

        // --- MATCH & ROUND LOGIC ---
        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            let millis = Math.floor(ms % 1000);
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${millis.toString().padStart(3, '0')}`;
        }

        function updateScoreboard() {
            scoreboardElement.innerHTML = activePlayersData.map(p => {
                return `<span style="color: ${p.color}">${p.id}: ${scores[p.id]}/${WINS_NEEDED}</span>`;
            }).join('<br>');
        }

        function initMatch() {
            // Remove focus from any clicked UI buttons so pressing Spacebar doesn't trigger them
            if (document.activeElement) {
                document.activeElement.blur();
            }

            // Sync visual mute state
            inGameMuteBtn.innerText = Synth.isMuted ? "Unmute" : "Mute";
            if (Synth.isMuted) inGameMuteBtn.classList.add('muted');
            else inGameMuteBtn.classList.remove('muted');

            postMatchLayer.classList.remove('winner-pulse');

            parseLobby();
            if (activePlayersData.length === 0) return; // Need at least 1 player

            scores = {};
            activePlayersData.forEach(p => scores[p.id] = 0);
            
            matchTime = 0;
            roundTimes = []; // Clear previous match's round times
            
            initialMenu.classList.add('hidden');
            lobbyLayer.classList.add('hidden');
            postMatchLayer.classList.add('hidden');
            hud.classList.remove('hidden');
            
            updateScoreboard();

            // Clear any leftover bugs; players are created fresh via onStateChange.
            bugs = [];

            initRound();
        }

        function initRound() {
            gameState = 'INITIALIZING'; // Temporarily change state to block draw() recursion

            // Always build a local grid so drawMaze has a valid 2D array.
            // For networked play this placeholder is overwritten by the first onStateChange.
            generateMaze();

            shockwaves = [];
            particles = [];
            rockets = [];
            
            powerUps = []; // Will be repopulated by server state
            screenShake = 0;
            
            resizeCanvas(); // Safe to resize and draw now that the new maze grid is generated!
            
            gameState = 'PLAYING';
            postMatchLayer.classList.add('hidden');
            lastTime = performance.now();
            roundStartTime = performance.now();
            Synth.muffle(false);
        }

        function returnToMenu() {
            if (typeof room !== 'undefined' && room) {
                room.leave();
                room = null;
            }
            gameState = 'MENU';
            postMatchLayer.classList.add('hidden');
            postMatchLayer.classList.remove('winner-pulse');
            hud.classList.add('hidden');
            lobbyLayer.classList.add('hidden');
            initialMenu.classList.remove('hidden');
            Synth.muffle(true);
            
            generateMaze();
            bugs = [];
            powerUps = [];
            particles = [];
            shockwaves = [];
            rockets = [];
            draw(true);
        }

        // --- DRAW LOOP ---
        function drawMaze() {
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, width, height);

            // --- TENSION BUILDER: Pulse background if someone is close to winning ---
            let closestBug = null;
            let minDist = Infinity;
            if (gameState === 'PLAYING' && distanceMap.length > 0) {
                bugs.forEach(bug => {
                    if (bug.state === 'normal') {
                        let d = distanceMap[bug.gridX][bug.gridY];
                        if (d < minDist) {
                            minDist = d;
                            closestBug = bug;
                        }
                    }
                });
            }

            if (closestBug && minDist <= 10) {
                const tension = 1 - (minDist / 10);
                const pulse = (Math.sin(performance.now() / 150) + 1) / 2;
                ctx.fillStyle = closestBug.color;
                ctx.globalAlpha = tension * pulse * 0.15;
                ctx.fillRect(0, 0, width, height);
                ctx.globalAlpha = 1.0;
            }

            ctx.strokeStyle = colors.wall;
            ctx.lineWidth = 4;
            ctx.lineCap = 'square';
            
            ctx.beginPath();
            if (grid && grid.length > 0) {
                for (let x = 0; x < cols; x++) {
                    for (let y = 0; y < rows; y++) {
                        const cell = grid[x][y];
                        if (!cell || !cell.walls) continue;
                        
                        let cx = x * cellSize, cy = y * cellSize;
                        // Walls: [top, right, bottom, left]
                        if (cell.walls[0]) { ctx.moveTo(cx, cy); ctx.lineTo(cx + cellSize, cy); }
                        if (cell.walls[1]) { ctx.moveTo(cx + cellSize, cy); ctx.lineTo(cx + cellSize, cy + cellSize); }
                        if (cell.walls[2]) { ctx.moveTo(cx, cy + cellSize); ctx.lineTo(cx + cellSize, cy + cellSize); }
                        if (cell.walls[3]) { ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + cellSize); }
                    }
                }
            }
            ctx.stroke();
            
            const gx = goal.x * cellSize + cellSize / 2, gy = goal.y * cellSize + cellSize / 2;
            const time = performance.now() / 500;
            
            ctx.save();
            ctx.translate(gx, gy);

            // Outer rotating aura
            ctx.rotate(time * 0.5);
            for(let i=0; i<8; i++) {
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(cellSize * 0.15, cellSize * 0.45);
                ctx.lineTo(-cellSize * 0.15, cellSize * 0.45);
                
                // Multi-coloured rays
                const rayHue = (i * 45 + time * 100) % 360;
                const alpha = 0.15 + Math.sin(time * 2) * 0.1;
                ctx.fillStyle = `hsla(${rayHue}, 100%, 50%, ${alpha})`;
                ctx.fill();
            }

            // Counter-rotating inner complex
            ctx.rotate(-time); 
            const pulse = (Math.sin(time * 3) + 1) / 2;
            
            // Draw an octagon portal core
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = i * Math.PI / 4;
                const radius = cellSize * 0.3 + (i % 2 === 0 ? pulse * cellSize * 0.05 : 0);
                const px = Math.cos(angle) * radius;
                const py = Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            
            ctx.fillStyle = '#050510';
            ctx.fill();
            
            const coreHue = (time * 150) % 360; // Rainbow shifting border
            ctx.lineWidth = 2;
            ctx.strokeStyle = `hsl(${coreHue}, 100%, 50%)`;
            ctx.shadowBlur = 15 + (pulse * 10);
            ctx.shadowColor = `hsl(${coreHue}, 100%, 50%)`;
            ctx.stroke();

            // Central bright spark
            ctx.beginPath();
            ctx.arc(0, 0, cellSize * 0.08, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20;
            // Fast rainbow shadow for the core
            const sparkHue = (time * 300) % 360;
            ctx.shadowColor = `hsl(${sparkHue}, 100%, 50%)`;
            ctx.fill();

            ctx.restore();
        }

        function drawPowerUps() {
            const time = performance.now() / 200;
            powerUps.forEach(p => {
                const px = p.x * cellSize + cellSize / 2, py = p.y * cellSize + cellSize / 2;
                ctx.save();
                ctx.translate(px, py);
                if (p.type === 'opponents') {
                    const pulse = 1 + Math.sin(time * 2) * 0.1;
                    ctx.scale(pulse, pulse);
                    ctx.beginPath();
                    ctx.arc(0, 0, cellSize * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff'; 
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = colors.powerupOpponents; 
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(0, 0, cellSize * 0.15, 0, Math.PI * 2);
                    ctx.fillStyle = colors.powerupOpponents;
                    ctx.fill();
                } else if (p.type === 'self') {
                    ctx.rotate(-time);
                    ctx.beginPath();
                    ctx.arc(0, 0, cellSize * 0.3, 0, Math.PI * 2);
                    ctx.fillStyle = colors.bg; 
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = colors.powerupSelf;
                    ctx.setLineDash([5, 5]); 
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = colors.powerupSelf;
                    ctx.stroke();
                    ctx.setLineDash([]); 
                } else if (p.type === 'rocket') {
                    const pulse = 1 + Math.sin(time * 3) * 0.1;
                    ctx.scale(pulse, pulse);
                    ctx.beginPath();
                    ctx.moveTo(0, -cellSize * 0.25);
                    ctx.lineTo(cellSize * 0.15, cellSize * 0.15);
                    ctx.lineTo(0, cellSize * 0.05);
                    ctx.lineTo(-cellSize * 0.15, cellSize * 0.15);
                    ctx.closePath();
                    ctx.fillStyle = '#ff3300';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff3300';
                    ctx.fill();
                }
                ctx.restore();
            });
        }

        let currentMazeData = [];
        
        function draw(force = false) {
            if (gameState === 'MENU' && !force) return;

            const now = performance.now();
            const dt = now - lastTime;
            lastTime = now;

            ctx.save();
            if (screenShake > 0) {
                const sx = (Math.random() - 0.5) * screenShake, sy = (Math.random() - 0.5) * screenShake;
                ctx.translate(sx, sy);
                screenShake -= dt * 0.05; 
                if (screenShake < 0) screenShake = 0;
            }

            drawMaze();
            drawPowerUps();

            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const sw = shockwaves[i];
                if (sw.update(dt)) sw.draw(); else shockwaves.splice(i, 1);
            }

            bugs.sort((a, b) => (a.isPlayer === b.isPlayer) ? 0 : a.isPlayer ? 1 : -1);
            bugs.forEach(bug => { bug.update(dt); bug.draw(); });

            for (let i = rockets.length - 1; i >= 0; i--) {
                const r = rockets[i];
                if (r.update(dt)) r.draw(); else rockets.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.update(dt)) p.draw(); else particles.splice(i, 1);
            }

            // In-game round over celebration overlay
            if (gameState === 'ROUND_OVER_COUNTDOWN') {
                roundCountdown -= dt;
                const secondsLeft = Math.ceil(roundCountdown / 1000);

                ctx.save();

                const titleSize = Math.max(20, width * 0.06);
                const subSize = Math.max(14, width * 0.04);

                // Slight dark bar for readability
                ctx.fillStyle = "rgba(5, 5, 16, 0.7)";
                ctx.fillRect(0, height / 2 - titleSize * 1.5, width, titleSize * 3.8);

                ctx.font = `bold ${titleSize}px monospace`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 20;
                ctx.shadowColor = currentWinner.color;
                ctx.fillStyle = currentWinner.color;
                ctx.fillText(`${currentWinner.id} Wins Round!`, width / 2, height / 2 - titleSize * 0.2);

                ctx.fillStyle = "#fff";
                ctx.font = `bold ${subSize}px monospace`;
                ctx.shadowColor = "#000";
                ctx.shadowBlur = 5;
                if (secondsLeft > 0) {
                    ctx.fillText(`${secondsLeft} second${secondsLeft !== 1 ? 's' : ''} to next round...`, width / 2, height / 2 + subSize * 1.5);
                } else {
                    ctx.fillText(`Next round starting...`, width / 2, height / 2 + subSize * 1.5);
                }

                if (!room && secondsLeft > 0) {
                    ctx.fillStyle = "#aaa";
                    ctx.font = `normal ${subSize * 0.8}px monospace`;
                    ctx.shadowBlur = 2;
                    ctx.fillText(`(Press Space to skip)`, width / 2, height / 2 + subSize * 2.8);
                }

                ctx.restore();

                if (roundCountdown <= 0) {
                    if (!room) initRound(); // networked play uses round_reset message instead
                }
            }

            ctx.restore(); 

            if (gameState !== 'MENU') {
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(() => draw(false));
            }
        }

        // --- INPUT HANDLING ---
        const controlsMap = {
            'WASD': { up: ['w', 'W'], right: ['d', 'D'], down: ['s', 'S'], left: ['a', 'A'] },
            'TFGH': { up: ['t', 'T'], right: ['h', 'H'], down: ['g', 'G'], left: ['f', 'F'] },
            'IJKL': { up: ['i', 'I'], right: ['l', 'L'], down: ['k', 'K'], left: ['j', 'J'] },
            'Arrows': { up: ['ArrowUp'], right: ['ArrowRight'], down: ['ArrowDown'], left: ['ArrowLeft'] },
            'Numpad': { up: ['8', 'Numpad8'], right: ['6', 'Numpad6'], down: ['5', 'Numpad5'], left: ['4', 'Numpad4'] }
        };

        window.addEventListener('keydown', (e) => {
            // Prevent spacebar or arrow keys from scrolling the page or pressing focused UI buttons!
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code) || e.key === ' ') {
                e.preventDefault();
            }

            // Allow skipping the round countdown instantly with Spacebar (local only — networked uses round_reset)
            if (!room && gameState === 'ROUND_OVER_COUNTDOWN' && (e.code === 'Space' || e.key === ' ')) {
                roundCountdown = 0;
                return;
            }

            if (gameState !== 'PLAYING') return;
            bugs.forEach(bug => {
                if (!bug.isPlayer) return;
                
                // Authoritative local check for input processing
                const isActuallyLocal = (room && room.sessionId) ? (bug.sessionId === room.sessionId) : bug.isLocal;
                if (!isActuallyLocal) return;

                const map = controlsMap[bug.controlScheme];
                if (!map) return;

                let dir = null;
                if (map.up.includes(e.key)) dir = 'up';
                else if (map.right.includes(e.key)) dir = 'right';
                else if (map.down.includes(e.key)) dir = 'down';
                else if (map.left.includes(e.key)) dir = 'left';

                if (dir) {
                    if (!bug.heldDirections.includes(dir)) {
                        bug.heldDirections.push(dir);
                        // Buffer the intent so early presses turn seamlessly, ONLY on initial keydown to avoid OS repeat bugs
                        bug.turnIntent = { dir: dir, time: performance.now() };
                    }
                }
            });
        });

        window.addEventListener('keyup', (e) => {
            // No gameState gate — releases must always clean up heldDirections.
            // Gating here would leave ghost held directions if the key is released
            // during ROUND_OVER_COUNTDOWN, causing the bug to auto-move next round.
            bugs.forEach(bug => {
                if (!bug.isPlayer) return;

                // Authoritative local check for input processing
                const isActuallyLocal = (room && room.sessionId) ? (bug.sessionId === room.sessionId) : bug.isLocal;
                if (!isActuallyLocal) return;

                const map = controlsMap[bug.controlScheme];
                if (!map) return;

                let dir = null;
                if (map.up.includes(e.key)) dir = 'up';
                else if (map.right.includes(e.key)) dir = 'right';
                else if (map.down.includes(e.key)) dir = 'down';
                else if (map.left.includes(e.key)) dir = 'left';

                if (dir) {
                    const index = bug.heldDirections.indexOf(dir);
                    if (index > -1) bug.heldDirections.splice(index, 1);
                    if (bug.turnIntent && bug.turnIntent.dir === dir) {
                        bug.turnIntent = null;
                    }
                }
            });
        });

        // Touch handling (Routes to Player 1 if they exist)
        let touchStartX = 0, touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        canvas.addEventListener('touchend', (e) => {
            // Tap to skip countdown on mobile (local only — networked uses round_reset)
            if (!room && gameState === 'ROUND_OVER_COUNTDOWN') {
                roundCountdown = 0;
                return;
            }

            if (gameState !== 'PLAYING') return;
            const p1 = bugs.find(b => {
                const isActuallyLocal = (room && room.sessionId) ? (b.sessionId === room.sessionId) : b.isLocal;
                return b.isPlayer && isActuallyLocal;
            });
            if (!p1) return;
            
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                let intentDx = 0, intentDy = 0;
                if (Math.abs(dx) > Math.abs(dy)) intentDx = dx > 0 ? 1 : -1;
                else intentDy = dy > 0 ? 1 : -1;
                p1.swipeIntent = { dx: intentDx, dy: intentDy, time: performance.now() };
            }
        }, {passive: true});

        // --- MENU BUTTON BINDINGS ---
        
        // Auto-clean and capitalize Friend Code input
        joinCodeInput.addEventListener('input', (e) => {
            const start = e.target.selectionStart;
            const end = e.target.selectionEnd;
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            e.target.setSelectionRange(start, end);
        });

        // In-game Menu Button
        inGameMenuBtn.addEventListener('click', () => {
            returnToMenu();
        });

        // In-game Restart Button — only valid for local play; networked rounds are server-controlled
        inGameRestartBtn.addEventListener('click', () => {
            if (document.activeElement) document.activeElement.blur();
            if (!room) initRound();
        });

        // In-game Mute Button
        inGameMuteBtn.addEventListener('click', () => {
            if (document.activeElement) document.activeElement.blur(); // Drop focus
            const isMuted = Synth.toggleMute();
            inGameMuteBtn.innerText = isMuted ? "Unmute" : "Mute";
            if (isMuted) inGameMuteBtn.classList.add('muted');
            else inGameMuteBtn.classList.remove('muted');
        });

        // Menu Navigation
        customSettingsBtn.addEventListener('click', () => {
            initialMenu.classList.add('hidden');
            lobbyLayer.classList.remove('hidden');
        });

        lobbyBackBtn.addEventListener('click', () => {
            lobbyLayer.classList.add('hidden');
            initialMenu.classList.remove('hidden');
        });

        // Start actions
        const client = new Colyseus.Client("ws://localhost:2567");
        let room;

        async function setupRoom(newRoom) {
            room = newRoom;
            console.log("Joined room:", room.roomId, "SessionID:", room.sessionId);

            // Update HUD to show the actual room code
            document.querySelectorAll('.display-friend-code').forEach(el => el.innerText = room.roomId);

            // Now that we have a room and a sessionId, we can safely init the match
            initMatch();
            if (animationId) cancelAnimationFrame(animationId);
            draw(true);

            // Listen for server state changes
            room.onStateChange((state) => {
                // Update timer from server
                timerElement.innerText = formatTime(state.timer * 1000);
                
                // Update goal
                goal.x = state.goalX;
                goal.y = state.goalY;

                // Sync Maze Grid
                if (state.grid && state.grid.length > 0) {
                    cols = state.cols;
                    rows = state.rows;
                    grid = [];
                    for (let x = 0; x < cols; x++) {
                        grid[x] = [];
