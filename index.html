<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Bug Race</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; margin: 0; overflow: hidden; touch-action: none; transition: filter 0.1s; }
        #main-wrapper { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 40px; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; }
        #hud { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 15px; width: 250px; flex-shrink: 0; z-index: 5; transition: opacity 0.3s; }
        .hud-buttons { display: flex; gap: 5px; width: 100%; margin-bottom: 5px; }
        #timer { font-size: 2.5rem; font-weight: bold; color: #fff; font-family: monospace; text-shadow: 0 0 5px #000, 0 0 10px #000; }
        #scoreboard { font-size: 1.2rem; color: #fff; text-align: left; line-height: 1.6; font-family: monospace; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        #friend-code-hud { font-family: monospace; font-size: 1.1rem; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); width: 100%; text-align: left; color: rgba(255, 255, 255, 0.7); }
        #game-container { position: relative; height: 100%; max-height: 85vh; aspect-ratio: 1 / 1; border-radius: 12px; box-shadow: 0 0 40px rgba(0, 255, 255, 0.15); background: #000000; overflow: hidden; transition: filter 0.1s; flex-shrink: 1; }
        canvas { display: block; width: 100%; height: 100%; }
        .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px); z-index: 10; transition: opacity 0.3s, background-color 0.5s; padding: 20px; }
        .hidden { opacity: 0; pointer-events: none; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; color: #fff; text-align: center; }
        p.subtitle { font-size: 1rem; margin-bottom: 1.5rem; color: #aaa; text-align: center; max-width: 90%; line-height: 1.4; }
        .menu-friend-code { font-family: monospace; font-size: 1.2rem; color: #00ffff; margin-bottom: 25px; background: rgba(0, 0, 0, 0.5); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(0, 255, 255, 0.3); }
        button.action-btn { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; color: #050510; background: #00ffff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #00ffff; transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; margin: 5px; }
        button.secondary-btn { background: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
        button.tertiary-btn { background: #39ff14; box-shadow: 0 0 20px #39ff14; }
        .join-group { display: flex; align-items: center; gap: 10px; margin: 15px 0; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); }
        .join-group input[type="text"] { background: transparent; border: none; color: #fff; font-size: 1.2rem; font-family: monospace; outline: none; width: 120px; text-align: center; text-transform: uppercase; }
        #version-number { position: fixed; bottom: 10px; right: 15px; font-family: monospace; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div id="version-number">v1.0.5</div>
    <div id="main-wrapper">
        <div id="hud" class="hidden">
            <div class="hud-buttons">
                <button class="action-btn" id="in-game-menu-btn" style="padding: 10px; font-size: 0.9rem; flex: 1; margin: 0;">Menu</button>
                <button class="action-btn secondary-btn" id="in-game-restart-btn" style="padding: 10px; font-size: 0.9rem; flex: 1; margin: 0;">Restart</button>
                <button class="action-btn" id="in-game-mute-btn" style="padding: 10px; font-size: 0.9rem; flex: 1; margin: 0; background: #ff9900; box-shadow: 0 0 20px #ff9900; color: #000;">Mute</button>
            </div>
            <div id="timer">00:00.000</div>
            <div id="scoreboard"></div>
            <div id="friend-code-hud">Code: <span class="display-friend-code" style="color: #00ffff; font-weight: bold;"></span></div>
        </div>
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="post-match-layer" class="menu-overlay hidden">
                <h1 id="pm-title">Match Over</h1>
                <button class="action-btn" id="play-again-btn">Play Again</button>
                <button class="action-btn secondary-btn" id="menu-btn">Main Menu</button>
            </div>
            <div id="initial-menu" class="menu-overlay">
                <h1>Neon Bug Race</h1>
                <p class="subtitle">First to 3 wins. Orbs teleport opponents, black holes teleport you.</p>
                <div class="menu-friend-code">Your Code: <span class="display-friend-code"></span></div>
                <button class="action-btn" id="quick-start-btn">Quick Start</button>
                <div class="join-group">
                    <input type="text" id="join-code-input" placeholder="Code..." maxlength="6">
                    <button class="action-btn secondary-btn" id="join-friend-btn">Join Friend</button>
                </div>
                <button class="action-btn tertiary-btn" id="custom-settings-btn">Custom</button>
            </div>
            <div id="lobby-layer" class="menu-overlay hidden">
                <h1>Custom Game</h1>
                <button class="action-btn secondary-btn" id="lobby-back-btn">Back</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/colyseus.js@0.14.13/dist/colyseus.js"></script>
    <script>
        const client = new Colyseus.Client("ws://localhost:2567");
        let room, localPlayers = new Map(), width, height, cellSize, ctx, canvas;
        
        // --- AUDIO SYSTEM ---
        const Synth = {
            isMuted: true,
            bgMusic: new Audio('./assets/audio/music.ogg'),
            init() { this.bgMusic.loop = true; this.bgMusic.volume = 0.4; },
            toggleMute() { this.isMuted = !this.isMuted; return this.isMuted; }
        };
        Synth.init();
        
        async function connect(options = {}) {
            room = options.joinCode ? await client.joinById(options.joinCode, options) : await client.joinOrCreate("game", options);
            document.getElementById('initial-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.querySelectorAll('.display-friend-code').forEach(el => el.innerText = room.roomId);
            room.state.players.onAdd = (p, id) => localPlayers.set(id, {x: p.x, y: p.y, color: p.color});
            room.state.players.onRemove = (_, id) => localPlayers.delete(id);
            requestAnimationFrame(loop);
        }

        function loop() {
            if(!room) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);
            room.state.grid.forEach((walls, index) => {
                const cols = room.state.cols, x = index % cols, y = Math.floor(index / cols);
                const cx = x * cellSize, cy = y * cellSize;
                ctx.strokeStyle = '#4a4a7a'; ctx.lineWidth = 4;
                if (walls & 1) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + cellSize, cy); ctx.stroke(); }
                if (walls & 2) { ctx.beginPath(); ctx.moveTo(cx + cellSize, cy); ctx.lineTo(cx + cellSize, cy + cellSize); ctx.stroke(); }
                if (walls & 4) { ctx.beginPath(); ctx.moveTo(cx, cy + cellSize); ctx.lineTo(cx + cellSize, cy + cellSize); ctx.stroke(); }
                if (walls & 8) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + cellSize); ctx.stroke(); }
            });
            room.state.players.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
            });
            requestAnimationFrame(loop);
        }

        window.onload = () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            document.getElementById('quick-start-btn').onclick = () => connect();
            document.getElementById('join-friend-btn').onclick = () => connect({ joinCode: document.getElementById('join-code-input').value.toUpperCase() });
            document.getElementById('custom-settings-btn').onclick = () => {
                document.getElementById('initial-menu').classList.add('hidden');
                document.getElementById('lobby-layer').classList.remove('hidden');
            };
            document.getElementById('lobby-back-btn').onclick = () => {
                document.getElementById('lobby-layer').classList.add('hidden');
                document.getElementById('initial-menu').classList.remove('hidden');
            };
            
            // HUD Button Handlers
            document.getElementById('in-game-menu-btn').onclick = () => location.reload();
            document.getElementById('in-game-restart-btn').onclick = () => room && room.send("start");
            document.getElementById('in-game-mute-btn').onclick = () => {
                const muted = Synth.toggleMute();
                document.getElementById('in-game-mute-btn').innerText = muted ? "Unmute" : "Mute";
            };

            window.addEventListener('resize', () => { 
                let size = Math.min(document.getElementById('game-container').clientWidth, document.getElementById('game-container').clientHeight);
                canvas.width = canvas.height = width = height = size; cellSize = size / 20;
            });
            window.dispatchEvent(new Event('resize'));
            window.addEventListener('keydown', (e) => {
                if (!room) return;
                let d = {dx: 0, dy: 0};
                if(e.key === 'w') d.dy = -1; else if(e.key === 's') d.dy = 1; else if(e.key === 'a') d.dx = -1; else if(e.key === 'd') d.dx = 1;
                if(d.dx || d.dy) room.send("move", d);
            });
        };
    </script>
</body>
</html>
