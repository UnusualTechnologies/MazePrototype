                        for (let y = 0; y < rows; y++) {
                            const serverCell = state.grid[x * rows + y];
                            const cell = new Cell(x, y);
                            cell.walls = [
                                serverCell.walls[0],
                                serverCell.walls[1],
                                serverCell.walls[2],
                                serverCell.walls[3]
                            ];
                            grid[x][y] = cell;
                        }
                    }
                    generateDistanceMap();
                    cellSize = width / cols;
                }

                // Sync Power-ups
                powerUps = [];
                state.powerUps.forEach(pu => {
                    powerUps.push({ x: pu.x, y: pu.y, type: pu.type });
                });

                // Sync Players
                state.players.forEach((playerState, sessionId) => {
                    let bug = bugs.find(b => b.sessionId === sessionId);
                    const isLocal = sessionId === room.sessionId;
                    if (!bug) {
                        // Create new bug for joined player
                        bug = new Bug({
                            id: playerState.id,
                            sessionId: sessionId,
                            color: playerState.color,
                            x: playerState.x,
                            y: playerState.y,
                            isPlayer: !playerState.isAI,
                            isLocal: isLocal,
                            // Online players each use WASD on their own machine.
                            // Slot controlScheme only applies to split-screen local play.
                            controlScheme: isLocal ? 'WASD' : (state.slots[playerState.slotIndex]?.controlScheme || 'WASD')
                        });
                        bugs.push(bug);
                    } else {
                        // Ensure isLocal and isPlayer status is always correct
                        bug.isLocal = isLocal;
                        bug.isPlayer = !playerState.isAI;

                        // Freeze position updates during round-over countdown — server is frozen too,
                        // so any position change here would be the reset teleport arriving early.
                        if (gameState === 'ROUND_OVER_COUNTDOWN') return;

                        // If player position changed drastically, trigger teleport animation
                        if (Math.abs(bug.gridX - playerState.x) > 1 || Math.abs(bug.gridY - playerState.y) > 1) {
                            if (bug.state === 'normal') {
                                // Trigger local teleport effect for visual consistency
                                bug.state = 'teleport_out';
                                bug.stateTimer = 1.0;
                                bug.targetGridX = playerState.x;
                                bug.targetGridY = playerState.y;

                                if (bug.isLocal) Synth.zip();
                                else Synth.glitch();
                            }
                        } else {
                            // Normal movement sync
                            bug.gridX = playerState.x;
                            bug.gridY = playerState.y;
                        }
                    }
                });

                // Sync server scores into local scores map (keeps scoreboard accurate for all clients)
                state.players.forEach((playerState, sessionId) => {
                    scores[playerState.id] = playerState.score;
                });
                updateScoreboard();

                // Remove players who left
                bugs = bugs.filter(b => state.players.has(b.sessionId));
            });

            room.onMessage("round_won", ({ winnerId, winnerColor, winnerScore, isMatchWon }) => {
                if (gameState === 'ROUND_OVER_COUNTDOWN' || gameState === 'MATCH_OVER') return;

                // Sync the winner's score from the server (don't double-increment)
                scores[winnerId] = winnerScore;
                updateScoreboard();

                const winnerBug = bugs.find(b => b.id === winnerId);

                // Round time tracking
                const currentRoundTime = performance.now() - roundStartTime;
                matchTime += currentRoundTime;
                roundTimes.push({ winnerId, winnerColor, time: currentRoundTime });

                // Explosion particles at winner's position
                screenShake = 40;
                if (winnerBug) {
                    for (let i = 0; i < 200; i++) {
                        particles.push(new Particle(winnerBug.pixelX, winnerBug.pixelY, winnerColor));
                        if (i % 4 === 0) particles.push(new Particle(winnerBug.pixelX, winnerBug.pixelY, '#ffffff'));
                    }
                }

                if (isMatchWon) {
                    Synth.win();
                    Synth.muffle(true);
                    gameState = 'MATCH_OVER';

                    postMatchLayer.style.setProperty('--winner-color', winnerColor);
                    postMatchLayer.classList.add('winner-pulse');
                    postMatchLayer.classList.remove('hidden');

                    const fastestRoundTime = Math.min(...roundTimes.map(rt => rt.time));
                    pmTitle.innerText = `${winnerId} Wins the Match!`;
                    pmTitle.style.textShadow = `0 0 20px ${winnerColor}, 0 0 40px ${winnerColor}`;

                    const isLocalWinner = winnerBug?.isLocal;
                    if (isLocalWinner) {
                        if (bestTime === null || matchTime < bestTime) { bestTime = matchTime; localStorage.setItem('neonBugBestTime', bestTime); }
                        if (worstTime === null || matchTime > worstTime) { worstTime = matchTime; localStorage.setItem('neonBugWorstTime', worstTime); }
                        pmSubtitle.innerHTML = `You won the Best-of-3!<br>Match Time: ${formatTime(matchTime)}<br>Fastest Round: ${formatTime(fastestRoundTime)}<br>Best Match Ever: ${formatTime(bestTime)} | Worst: ${formatTime(worstTime)}`;
                    } else {
                        pmSubtitle.innerHTML = `${winnerId} won the Best-of-3!<br>Match Time: ${formatTime(matchTime)}<br>Fastest Round: ${formatTime(fastestRoundTime)}`;
                    }

                    playAgainBtn.innerText = `Play Again with Friend Code ${room.roomId}`;

                    const roundTimesList = document.getElementById('pm-round-times');
                    roundTimesList.innerHTML = roundTimes.map((rt, index) =>
                        `<div>Round ${index + 1}: <span style="color:${rt.winnerColor};font-weight:bold;">${rt.winnerId}</span> - ${formatTime(rt.time)}</div>`
                    ).join('');
                } else {
                    gameState = 'ROUND_OVER_COUNTDOWN';
                    currentWinner = winnerBug || { id: winnerId, color: winnerColor };
                    roundCountdown = 3000;
                }
            });

            room.onMessage("round_reset", () => {
                bugs.forEach(bug => {
                    // Clear teleport animations
                    bug.state = 'normal';
                    bug.stateTimer = 0;
                    // Clear all input state so no ghost directions carry into the new round
                    bug.heldDirections = [];
                    bug.turnIntent = null;
                    bug.swipeIntent = null;
                    bug.bonkTimer = 0;
                    bug.bonkDx = 0;
                    bug.bonkDy = 0;
                });
                initRound();
            });
        }

        quickStartBtn.addEventListener('click', async () => {
            Synth.init();
            Synth.startMusic();
            if (Synth.ctx.state === 'suspended') Synth.ctx.resume();

            bugs = [];
            try {
                // Build settings from the lobby UI so Quick Start respects the player's configured slots
                const settings = {
                    cols: parseInt(document.getElementById('grid-size-input').value, 10) || 20,
                    puOpp: parseInt(document.getElementById('pu-opp-input').value, 10) || 10,
                    puSelf: parseInt(document.getElementById('pu-self-input').value, 10) || 10,
                    puRocket: parseInt(document.getElementById('pu-rocket-input').value, 10) || 0,
                    slots: lobbySlots.map(s => ({
                        mode: s.typeSelect.value,
                        id: s.id,
                        color: s.color,
                        aiSpeed: s.aiSpeedSelect.value,
                        aiCustomSpeed: parseInt(s.customSpeedSlider.value, 10),
                        aiBehavior: s.aiBehaviorSelect.value,
                        controlScheme: s.controlSelect.value
                    }))
                };

                const newRoom = await client.joinOrCreate("game", settings);
                
                // Wait a tiny bit to ensure sessionId is ready
                if (!newRoom.sessionId) {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                setupRoom(newRoom);
            } catch (e) {
                console.error("Could not join/create room", e);
                alert("Could not connect to server. Is it running?");
            }
        });

        joinFriendBtn.addEventListener('click', async () => {
            if (joinCodeInput.value.length < 3) return;
            Synth.init(); 
            Synth.startMusic();
            if (Synth.ctx.state === 'suspended') Synth.ctx.resume();

            bugs = [];
            try {
                const newRoom = await client.joinById(joinCodeInput.value);
                setupRoom(newRoom);
            } catch (e) {
                console.error("Could not join room", e);
                if (e.message.toLowerCase().includes("not found")) {
                    alert("Room not found. Please check the code and ensure it matches exactly (Case Sensitive).");
                } else if (e.message === "ROOM_FULL") {
                    alert("This room is currently full.");
                } else {
                    alert("An error occurred while joining the room: " + e.message);
                }
                // Stop initialization on failure
            }
        });

        startBtn.addEventListener('click', async () => {
            Synth.init(); 
            Synth.startMusic();
            if (Synth.ctx.state === 'suspended') Synth.ctx.resume();
            
            bugs = [];
            try {
                const settings = {
                    cols: parseInt(document.getElementById('grid-size-input').value, 10),
                    puOpp: parseInt(document.getElementById('pu-opp-input').value, 10),
                    puSelf: parseInt(document.getElementById('pu-self-input').value, 10),
                    puRocket: parseInt(document.getElementById('pu-rocket-input').value, 10),
                    slots: lobbySlots.map(s => ({
                        mode: s.typeSelect.value,
                        id: s.id,
                        color: s.color,
                        aiSpeed: s.aiSpeedSelect.value,
                        aiCustomSpeed: parseInt(s.customSpeedSlider.value, 10),
                        aiBehavior: s.aiBehaviorSelect.value,
                        controlScheme: s.controlSelect.value
                    })),
                    collisions: document.getElementById('collisions-toggle').checked,
                    isPrivate: document.getElementById('private-toggle').checked
                };

                const newRoom = await client.create("game", settings);
                setupRoom(newRoom);
            } catch (e) {
                console.error("Could not create custom room", e);
                alert("Could not connect to server. Is it running?");
            }
        });

        // Play Again button at the match end
        playAgainBtn.addEventListener('click', () => {
            initMatch(); 
            if (animationId) cancelAnimationFrame(animationId);
            draw(true);
        });

        menuBtn.addEventListener('click', () => {
            returnToMenu();
        });

        window.addEventListener('resize', resizeCanvas);

        window.onload = () => {
            buildLobby();
            generateMaze();
            resizeCanvas();
        };
    </script>
</body>
</html>
    </script>
